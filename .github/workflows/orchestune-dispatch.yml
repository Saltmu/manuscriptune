name: Orchestune Dispatch Cycle

on:
  schedule:
    # 毎時17分（:00ちょうどのGitHub側混雑を避けるためオフセット）
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      apply:
        description: "ラベル更新・worktree作成・実dispatchまで行う場合はtrue（未指定はdry-run）"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: read

concurrency:
  group: orchestune-dispatch
  cancel-in-progress: false

env:
  STATE_BRANCH: orchestune-state
  RUN_STATE_PATH: run_state.json
  EVENTS_LOG_PATH: events.jsonl

jobs:
  dispatch:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/orchestune

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure git identity
        # dispatch-cycle経由でIntegratorがgit merge --no-ffでコミットを作成するため、
        # それより前にidentityを設定しておく必要がある（未設定だと
        # "Committer identity unknown" でmergeが失敗し、Merge conflictと誤診断される）。
        run: |
          git config user.name "orchestune-bot"
          git config user.email "orchestune-bot@users.noreply.github.com"

      - name: Restore state files from state branch
        run: |
          if git ls-remote --exit-code --heads origin "$STATE_BRANCH" > /dev/null 2>&1; then
            git fetch origin "$STATE_BRANCH"
            # working-directoryがtools/orchestuneのため、パスはcwd相対（./プレフィックス）で解決する必要がある
            git show "origin/${STATE_BRANCH}:./${RUN_STATE_PATH}" > "$RUN_STATE_PATH" 2>/dev/null || echo "{}" > "$RUN_STATE_PATH"
            git show "origin/${STATE_BRANCH}:./${EVENTS_LOG_PATH}" > "$EVENTS_LOG_PATH" 2>/dev/null || touch "$EVENTS_LOG_PATH"
          else
            echo "{}" > "$RUN_STATE_PATH"
            touch "$EVENTS_LOG_PATH"
          fi

      - name: Set up Python 3.12
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        uses: actions/cache@v5
        with:
          path: tools/orchestune/.venv
          key: orchestune-venv-v1-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('tools/orchestune/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Load cached root venv
        # Integratorは仮マージ検証のためルートリポジトリの一時worktreeで
        # ./scripts/local-ci.sh を実行するが、上記の Install dependencies は
        # tools/orchestune（このジョブのdefault working-directory）のpoetry環境しか
        # 整備しないため、ルートプロジェクト用に別途セットアップする。
        # #301: v1キャッシュが早期に作られたまま(poetry.lock変更なしでは
        # 再構築されない)不整合を起こしていた疑いがあるため、v2へバンプして
        # 強制的に作り直す。
        uses: actions/cache@v5
        with:
          path: .venv
          key: root-venv-v2-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Install root project dependencies
        working-directory: .
        run: poetry install --no-interaction

      - name: Run dispatch cycle (scheduled)
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORCHESTUNE_ROUTINE_ID: ${{ secrets.ORCHESTUNE_ROUTINE_ID }}
          ORCHESTUNE_ROUTINE_TOKEN: ${{ secrets.ORCHESTUNE_ROUTINE_TOKEN }}
        run: |
          poetry run dispatch-cycle --apply --dispatch-target cloud-routine \
            --run-state-path "$RUN_STATE_PATH" --events-log-path "$EVENTS_LOG_PATH"

      - name: Run dispatch cycle (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORCHESTUNE_ROUTINE_ID: ${{ secrets.ORCHESTUNE_ROUTINE_ID }}
          ORCHESTUNE_ROUTINE_TOKEN: ${{ secrets.ORCHESTUNE_ROUTINE_TOKEN }}
        run: |
          APPLY_FLAG=""
          if [ "${{ inputs.apply }}" = "true" ]; then
            APPLY_FLAG="--apply"
          fi
          poetry run dispatch-cycle $APPLY_FLAG --dispatch-target cloud-routine \
            --run-state-path "$RUN_STATE_PATH" --events-log-path "$EVENTS_LOG_PATH"

      - name: Persist state files to state branch
        if: always()
        run: |
          STATE_DIR=$(mktemp -d)
          cp "$RUN_STATE_PATH" "$STATE_DIR/$RUN_STATE_PATH"
          cp "$EVENTS_LOG_PATH" "$STATE_DIR/$EVENTS_LOG_PATH"
          # 未追跡のまま残すとbranch切替時に「would be overwritten」で失敗するため、退避後に削除しておく
          rm -f "$RUN_STATE_PATH" "$EVENTS_LOG_PATH"

          if git ls-remote --exit-code --heads origin "$STATE_BRANCH" > /dev/null 2>&1; then
            git fetch origin "$STATE_BRANCH"
            git checkout -B "$STATE_BRANCH" "origin/$STATE_BRANCH"
          else
            git checkout --orphan "$STATE_BRANCH"
            # cwdがtools/orchestuneのため、":/"でリポジトリ全体を対象にする
            git rm -rf ':/' > /dev/null 2>&1 || true
          fi

          cp "$STATE_DIR/$RUN_STATE_PATH" "$RUN_STATE_PATH"
          cp "$STATE_DIR/$EVENTS_LOG_PATH" "$EVENTS_LOG_PATH"
          # ルートの.gitignore(*.json)に引っかかるため、この状態専用ブランチでは明示的にforce-add する
          git add -f "$RUN_STATE_PATH" "$EVENTS_LOG_PATH"

          if git diff --cached --quiet; then
            echo "state files unchanged, skipping commit."
          else
            git commit -m "chore(orchestune): update run_state.json and events.jsonl"
            git push origin "$STATE_BRANCH"
          fi
