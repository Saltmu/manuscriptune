<!-- VIEW 6: Settings -->
<div class="view-content" id="view-settings">
    <div class="view-loading-overlay" id="settings-loading-overlay">
        <div class="spinner"></div>
        <div class="view-loading-text">設定読み込み中...</div>
    </div>
    <div class="scrollable-view">
        <div class="view-title-area">
            <h2>プロジェクト設定</h2>
            <p>小説執筆および校閲時に使用するAIモデルや参照するポリシーのデフォルト設定。</p>
        </div>

        <div class="card" style="max-width: 600px; padding: 24px; margin-top: 20px;">
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
                    <label for="settings-title" style="font-weight: 600; font-size: 0.9rem;">小説タイトル</label>
                    <input type="text" id="settings-title" placeholder="重天の調律師" style="padding: 10px 14px; background-color: #0b0f19; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); font-size: 0.9rem;">
                </div>

                <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
                    <label for="settings-model" style="font-weight: 600; font-size: 0.9rem;">使用するAIモデル</label>
                    <select id="settings-model" style="padding: 10px 14px; background-color: #0b0f19; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); font-size: 0.9rem;">
                        <option value="Gemini 3.5 Flash (High)">Gemini 3.5 Flash (High)</option>
                    </select>
                </div>

                <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
                    <label for="settings-policy-global" style="font-weight: 600; font-size: 0.9rem;">全体執筆ポリシー</label>
                    <select id="settings-policy-global" style="padding: 10px 14px; background-color: #0b0f19; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); font-size: 0.9rem;">
                        <option value="">(デフォルト/自動解決)</option>
                    </select>
                </div>

                <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
                    <label for="settings-policy-chapter" style="font-weight: 600; font-size: 0.9rem;">章執筆ポリシー</label>
                    <select id="settings-policy-chapter" style="padding: 10px 14px; background-color: #0b0f19; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); font-size: 0.9rem;">
                        <option value="">(デフォルト/自動解決)</option>
                    </select>
                </div>

                <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
                    <label for="settings-character" style="font-weight: 600; font-size: 0.9rem;">キャラクター概要</label>
                    <select id="settings-character" style="padding: 10px 14px; background-color: #0b0f19; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); font-size: 0.9rem;">
                        <option value="">(デフォルト/自動解決)</option>
                    </select>
                </div>

                <div style="margin-top: 10px;">
                    <button class="btn-primary" onclick="saveSettings()" style="padding: 10px 20px; font-size: 0.9rem; font-weight: 600;">設定を保存</button>
                </div>
            </div>
        </div>
    </div>
</div>
