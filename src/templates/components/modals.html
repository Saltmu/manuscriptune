<!-- Confirm Apply Modal -->
<div class="modal-overlay" id="apply-modal">
    <div class="modal">
        <h3>変更を小説に反映しますか？</h3>
        <p>採用マークした指摘事項を小説テキストに適用します。適用前にバックアップファイルが自動的に作成されます。</p>
        <div class="modal-buttons">
            <button class="btn-secondary" onclick="closeModal('apply-modal')">キャンセル</button>
            <button class="btn-primary" onclick="executeApply()">反映を実行</button>
        </div>
    </div>
</div>

<!-- Apply Progress Modal -->
<div class="modal-overlay" id="apply-progress-modal">
    <div class="modal" style="max-width: 800px; width: 90%; text-align: left;">
        <h3>小説への反映処理を実行中</h3>
        <p style="margin-bottom: 12px;">指摘事項の自動反映スクリプトを実行しています。LLMによる文章生成やテキスト置換のログが以下にリアルタイム表示されます。</p>
        
        <div class="console-container" style="margin-top: 16px; margin-bottom: 16px;">
            <div class="console-header">
                <span>Apply Findings Console</span>
                <span id="apply-console-status">READY</span>
            </div>
            <div class="console-log" id="apply-console-log" style="height: 300px; overflow-y: auto; font-family: 'Fira Code', monospace; font-size: 0.85rem; background-color: #0f172a; color: #f8fafc; padding: 12px; border-radius: 8px; white-space: pre-wrap; word-break: break-all;">--- 待機中 ---</div>
        </div>
        
        <div class="modal-buttons" style="justify-content: flex-end;">
            <button class="btn-primary" id="btn-close-apply-progress" onclick="closeApplyProgressModal()" disabled>完了してエディタに戻る</button>
        </div>
    </div>
</div>

<!-- Confirm Global Shutdown Modal -->
<div class="modal-overlay" id="shutdown-global-modal">
    <div class="modal">
        <h3>Novel Studio を終了しますか？</h3>
        <p>サーバーをシャットダウンし、ブラウザセッションを終了します。保存された採用マーク情報はYAMLファイルに残ります。</p>
        <div class="modal-buttons">
            <button class="btn-secondary" onclick="closeModal('shutdown-global-modal')">キャンセル</button>
            <button class="btn-primary" style="background-color: var(--severity-high);" onclick="executeGlobalShutdown()">終了する</button>
        </div>
    </div>
</div>

<div class="toast" id="toast">保存しました</div>
